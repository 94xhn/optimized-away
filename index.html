<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>今天我被优化了</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e18; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    touch-action: none; user-select: none;
  }
  #c { display: block; width: 100%; height: 100%; }
  #hint {
    position: fixed; left: 0; right: 0; bottom: 10px; text-align: center;
    color: #4a5468; font-size: 12px; letter-spacing: .5px; pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">← → 或拖动 / 点屏幕左右半边移动</div>
<script>
(function () {
  "use strict";

  function vw() { return window.innerWidth || document.documentElement.clientWidth || 400; }
  function vh() { return window.innerHeight || document.documentElement.clientHeight || 640; }

  var canvas = document.getElementById("c");
  var ctx = canvas.getContext("2d");
  var DPR = 1;
  var W = vw(), H = vh();

  function resize() {
    W = vw(); H = vh();
    DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  // ---------- 音效引擎(Web Audio 实时合成,零依赖)----------
  function Audio2() { this.ctx = null; this.master = null; this.ok = true; }
  Audio2.prototype.unlock = function () {
    if (!this.ok) return;
    try {
      if (!this.ctx) {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) { this.ok = false; return; }
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.26;
        this.master.connect(this.ctx.destination);
      }
      if (this.ctx.state === "suspended") this.ctx.resume();
    } catch (e) { this.ok = false; }
  };
  Audio2.prototype.tone = function (freq, dur, type, vol, slideTo) {
    if (!this.ok || !this.ctx) return;
    var t = this.ctx.currentTime;
    var o = this.ctx.createOscillator();
    var g = this.ctx.createGain();
    o.type = type || "triangle";
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.3, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.03);
  };
  Audio2.prototype.noise = function (dur, vol, cut) {
    if (!this.ok || !this.ctx) return;
    var t = this.ctx.currentTime;
    var len = Math.floor(this.ctx.sampleRate * dur);
    var buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    var src = this.ctx.createBufferSource(); src.buffer = buf;
    var f = this.ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = cut || 1000;
    var g = this.ctx.createGain(); g.gain.value = vol || 0.3;
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t);
  };
  var SCALE = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 19, 21, 24];
  Audio2.prototype.good = function (step) {
    var semi = SCALE[Math.min(step, SCALE.length - 1)];
    var freq = 392 * Math.pow(2, semi / 12);
    this.tone(freq, 0.14, "triangle", 0.32);
    this.tone(freq * 2, 0.10, "sine", 0.12);
  };
  Audio2.prototype.bad = function () {
    this.tone(180, 0.22, "sawtooth", 0.34, 64);
    this.noise(0.20, 0.30, 1400);
  };
  Audio2.prototype.start = function () {
    var self = this;
    [392, 523, 659].forEach(function (f, i) {
      setTimeout(function () { self.tone(f, 0.12, "triangle", 0.28); }, i * 70);
    });
  };
  Audio2.prototype.over = function () {
    var self = this;
    [330, 277, 220, 165].forEach(function (f, i) {
      setTimeout(function () { self.tone(f, 0.28, "sawtooth", 0.3, f * 0.85); }, i * 130);
    });
    this.noise(0.5, 0.25, 800);
  };
  Audio2.prototype.milestone = function () {
    this.tone(880, 0.10, "square", 0.18);
    this.tone(1320, 0.12, "square", 0.14);
  };
  Audio2.prototype.fever = function () {
    var self = this;
    [392, 494, 587, 698, 880, 1047].forEach(function (f, i) {
      setTimeout(function () { self.tone(f, 0.16, "square", 0.26); }, i * 55);
    });
  };
  Audio2.prototype.smash = function () {
    this.tone(1047, 0.10, "square", 0.26);
    this.tone(1568, 0.12, "square", 0.18);
  };
  Audio2.prototype.feverEnd = function () {
    this.tone(523, 0.30, "triangle", 0.26);
    this.tone(659, 0.30, "triangle", 0.20);
    this.tone(784, 0.34, "triangle", 0.18);
  };
  // 晋升:强力上行号角
  Audio2.prototype.levelup = function () {
    var self = this;
    [523, 659, 784, 1047, 1319].forEach(function (f, i) {
      setTimeout(function () { self.tone(f, 0.15, "square", 0.26); }, i * 60);
    });
  };

  // ---------- 文案库(梗)----------
  var GOOD = [
    { e: "💰", t: "工资到账" }, { e: "☕", t: "续命咖啡" }, { e: "🎉", t: "项目上线" },
    { e: "🛡️", t: "成功转正" }, { e: "🏆", t: "季度之星" }, { e: "🍗", t: "团建加餐" },
    { e: "💡", t: "好点子" }, { e: "📈", t: "KPI 达标" }
  ];
  var BAD = [
    { e: "📋", t: "N+1 大礼包" }, { e: "⏰", t: "强制加班" }, { e: "🔥", t: "背锅侠" },
    { e: "💢", t: "领导 PUA" }, { e: "🎂", t: "35 岁危机" }, { e: "🪑", t: "工位被撤" },
    { e: "📉", t: "绩效垫底" }, { e: "🌧️", t: "优化通知" }
  ];

  // ---------- 职场进化形态(成长系统)----------
  // at=升级所需积分; wm=托盘宽度倍率; tray=托盘色; perk=解锁能力说明
  var FORMS = [
    { name: "实习生",   emoji: "🧑‍💼", at: 0,    wm: 1.00, tray: "#7da2ff", perk: "" },
    { name: "正式员工", emoji: "🧑‍💻", at: 120,  wm: 1.18, tray: "#5ad1ff", perk: "托盘加宽" },
    { name: "小组长",   emoji: "👔",   at: 320,  wm: 1.34, tray: "#46e08a", perk: "接好物回血翻倍" },
    { name: "部门主管", emoji: "🕴️",   at: 640,  wm: 1.50, tray: "#c08aff", perk: "磁吸常驻收割" },
    { name: "打工超人", emoji: "🦸",   at: 1100, wm: 1.68, tray: "#ffc046", perk: "逆袭更快更久" },
    { name: "卷王之王", emoji: "🐲",   at: 1800, wm: 1.90, tray: "#ff6ad0", perk: "逆袭暴击×1.5+金币雨" }
  ];

  function verdict(days) {
    if (days < 8)   return "试用期都没撑过,主打一个高效。";
    if (days < 30)  return "毕业季,恭喜你成为应届被优化生。";
    if (days < 90)  return "一个季度,刚好赶上第一波优化。";
    if (days < 200) return "老员工预备役,N+X 警告已送达。";
    if (days < 365) return "卷王本王,可惜公司要降本增笑。";
    return "你居然撑过了一年?HR 表示这不科学。";
  }

  var audio = new Audio2();
  var FEVER_DUR = 6;
  var BASE_W = 92;

  // ---------- 游戏 ----------
  function Game() {
    this.state = "ready";
    this.best = +(localStorage.getItem("optimized_best") || 0);
    this.bestForm = +(localStorage.getItem("optimized_bestform") || 0);
    this.stars = [];
    this.reset();
  }

  Game.prototype.initStars = function () {
    this.stars = [];
    var n = clamp(Math.round((W * H) / 22000), 24, 70);
    for (var i = 0; i < n; i++) {
      this.stars.push({ x: Math.random() * W, y: Math.random() * H, r: rand(0.6, 2.2), v: rand(8, 28), a: rand(0.05, 0.35) });
    }
  };

  Game.prototype.reset = function () {
    this.t = 0;
    this.hp = 100;
    this.score = 0;
    this.days = 0;
    this.items = [];
    this.pops = [];
    this.parts = [];
    this.rings = [];
    this.shards = [];
    this.spawnTimer = 0;
    this.shake = 0;
    this.flash = 0;
    this.overFlash = 0;
    this.slowmo = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.comboPulse = 0;
    this.hpPulse = 0;
    this.scorePulse = 0;
    this.bgHue = 0;
    this.nextMile = 15;
    this.rage = 0;
    this.fever = 0;
    this.feverFlash = 0;
    this.feverGain = 0;
    this.ragePulse = 0;
    // —— 进化系统 ——
    this.level = 0;
    this.baseW = BASE_W;
    this.levelFlash = 0;
    this.player = { x: W / 2, w: BASE_W, h: 18, speed: 540, sy: 1, sx: 1 };
    this.keyL = false; this.keyR = false;
    this.pointerX = null;
    if (!this.stars.length) this.initStars();
  };

  Game.prototype.start = function () {
    this.reset();
    this.state = "playing";
    audio.unlock();
    audio.start();
  };

  Game.prototype.trayW = function () {
    return this.baseW * (this.fever > 0 ? 2.4 : 1);
  };

  Game.prototype.gameOver = function () {
    this.state = "over";
    this.fever = 0;
    this.player.w = this.baseW;
    this.overFlash = 1;
    this.slowmo = 1;
    this.shake = 26;
    audio.over();
    var p = this.player, y = H - 70;
    for (var i = 0; i < 16; i++) {
      this.shards.push({
        x: p.x + rand(-p.w / 2, p.w / 2), y: y + rand(0, p.h),
        vx: rand(-260, 260), vy: rand(-420, -120),
        rot: rand(0, 6.28), vr: rand(-10, 10),
        s: rand(5, 12), life: 1, color: FORMS[this.level].tray
      });
    }
    this.burst(p.x, y, "#ff5b6b", 40, 1.4);
    if (this.days > this.best) {
      this.best = this.days;
      try { localStorage.setItem("optimized_best", String(this.best)); } catch (e) {}
    }
    if (this.level > this.bestForm) {
      this.bestForm = this.level;
      try { localStorage.setItem("optimized_bestform", String(this.bestForm)); } catch (e) {}
    }
  };

  // —— 进化:积分跨阈值时晋升形态 ——
  Game.prototype.checkLevelUp = function () {
    while (this.level < FORMS.length - 1 && this.score >= FORMS[this.level + 1].at) {
      this.level++;
      var f = FORMS[this.level];
      this.baseW = BASE_W * f.wm;
      this.player.w = this.trayW();
      this.levelFlash = 1;
      this.shake = Math.max(this.shake, 18);
      this.addPop(W / 2, H * 0.40, "🎖️ 晋升:" + f.name, f.tray, true);
      this.addPop(W / 2, H * 0.40 + 32, "解锁 " + f.perk, "#dfe6f2", false);
      this.ring(W / 2, H * 0.40, "rgba(255,255,255,0.95)");
      this.burst(W / 2, H * 0.40, f.tray, 46, 1.6);
      audio.levelup();
    }
  };

  Game.prototype.startFever = function () {
    this.fever = FEVER_DUR + (this.level >= 4 ? 2 : 0);   // 打工超人:逆袭更久
    this.feverFlash = 1;
    this.feverGain = 0;
    this.player.w = this.trayW();
    this.shake = Math.max(this.shake, 16);
    this.addPop(W / 2, H * 0.34, "🔥 逆袭时刻!", "#ffd24a", true);
    this.ring(W / 2, H * 0.34, "rgba(255,210,74,0.95)");
    this.burst(W / 2, H * 0.34, "#ffd24a", 40, 1.4);
    audio.fever();
  };

  Game.prototype.endFever = function () {
    this.fever = 0;
    this.rage = 0;
    this.player.w = this.trayW();
    this.addPop(W / 2, H * 0.4, "这波 +" + this.feverGain + ",不亏!", "#ffd24a", true);
    this.burst(this.player.x, H - 80, "#ffd24a", 30, 1.2);
    audio.feverEnd();
  };

  Game.prototype.difficulty = function () {
    if (this.fever > 0) {
      return { fall: 200 + (this.t / 45) * 120, interval: 0.24, badRatio: 0.30 };
    }
    var d = this.t / 45;
    return {
      fall: 150 + d * 240,
      interval: Math.max(0.40, 0.95 - d * 0.52),
      badRatio: Math.min(0.62, 0.42 + d * 0.22)
    };
  };

  Game.prototype.spawn = function () {
    var diff = this.difficulty();
    var isBad = Math.random() < diff.badRatio;
    var data = isBad ? pick(BAD) : pick(GOOD);
    var r = 26;
    this.items.push({
      x: rand(r + 8, W - r - 8), y: -r, r: r,
      vy: diff.fall * rand(0.85, 1.2),
      bad: isBad, e: data.e, t: data.t,
      spin: rand(0, 6.28), vspin: rand(-2, 2), trail: []
    });
  };

  Game.prototype.addPop = function (x, y, text, color, big) {
    this.pops.push({ x: x, y: y, text: text, color: color, life: 1, vy: -52, scale: big ? 1.6 : 1.2 });
  };

  Game.prototype.burst = function (x, y, color, n, power) {
    power = power || 1;
    for (var i = 0; i < n; i++) {
      var a = Math.random() * 6.2832;
      var sp = rand(40, 320) * power;
      this.parts.push({
        x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - rand(0, 80),
        life: rand(0.4, 0.9), max: 0.9, r: rand(2, 5) * power, color: color
      });
    }
    if (this.parts.length > 340) this.parts.splice(0, this.parts.length - 340);
  };

  Game.prototype.ring = function (x, y, color) {
    this.rings.push({ x: x, y: y, r: 10, max: rand(46, 64), life: 1, color: color });
  };

  Game.prototype.updateFx = function (dt) {
    for (var s = 0; s < this.stars.length; s++) {
      var st = this.stars[s];
      st.y -= st.v * dt;
      if (st.y < -4) { st.y = H + 4; st.x = Math.random() * W; }
    }
    for (var i = this.parts.length - 1; i >= 0; i--) {
      var pt = this.parts[i];
      pt.vy += 520 * dt;
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.life -= dt;
      if (pt.life <= 0) this.parts.splice(i, 1);
    }
    for (var k = this.rings.length - 1; k >= 0; k--) {
      var rg = this.rings[k];
      rg.r += (rg.max - rg.r) * Math.min(1, dt * 9);
      rg.life -= dt * 2.2;
      if (rg.life <= 0) this.rings.splice(k, 1);
    }
    for (var m = this.shards.length - 1; m >= 0; m--) {
      var sh = this.shards[m];
      sh.vy += 760 * dt;
      sh.x += sh.vx * dt; sh.y += sh.vy * dt;
      sh.rot += sh.vr * dt; sh.life -= dt * 0.7;
      if (sh.life <= 0 || sh.y > H + 40) this.shards.splice(m, 1);
    }
    for (var j = this.pops.length - 1; j >= 0; j--) {
      var pop = this.pops[j];
      pop.y += pop.vy * dt; pop.vy *= 0.92;
      pop.scale += (1 - pop.scale) * Math.min(1, dt * 10);
      pop.life -= dt * 1.3;
      if (pop.life <= 0) this.pops.splice(j, 1);
    }
    if (this.shake > 0) this.shake = Math.max(0, this.shake - dt * 42);
    if (this.flash > 0) this.flash = Math.max(0, this.flash - dt * 2.6);
    if (this.overFlash > 0) this.overFlash = Math.max(0, this.overFlash - dt * 1.4);
    if (this.slowmo > 0) this.slowmo = Math.max(0, this.slowmo - dt * 0.8);
    if (this.comboPulse > 0) this.comboPulse = Math.max(0, this.comboPulse - dt * 3);
    if (this.hpPulse > 0) this.hpPulse = Math.max(0, this.hpPulse - dt * 3);
    if (this.scorePulse > 0) this.scorePulse = Math.max(0, this.scorePulse - dt * 4);
    if (this.ragePulse > 0) this.ragePulse = Math.max(0, this.ragePulse - dt * 3);
    if (this.feverFlash > 0) this.feverFlash = Math.max(0, this.feverFlash - dt * 1.6);
    if (this.levelFlash > 0) this.levelFlash = Math.max(0, this.levelFlash - dt * 1.8);
    this.player.sy += (1 - this.player.sy) * Math.min(1, dt * 12);
    this.player.sx += (1 - this.player.sx) * Math.min(1, dt * 12);
    this.bgHue += dt * 6;
  };

  Game.prototype.update = function (dt) {
    this.updateFx(dt);
    if (this.state !== "playing") return;

    this.t += dt;
    this.days = Math.floor(this.t);

    if (this.fever > 0) {
      this.fever -= dt;
      if (this.fever <= 0) this.endFever();
    }

    if (this.days >= this.nextMile) {
      this.nextMile += 15;
      audio.milestone();
      this.addPop(W / 2, H * 0.28, "在职 " + this.days + " 天!", "#ffc046", true);
      this.ring(W / 2, H * 0.28, "rgba(255,192,70,0.8)");
    }

    if (this.combo > 0) {
      this.comboTimer -= dt;
      if (this.comboTimer <= 0) this.combo = 0;
    }

    var p = this.player;
    if (this.pointerX != null) {
      p.x += (this.pointerX - p.x) * Math.min(1, dt * 16);
    } else {
      var dir = (this.keyR ? 1 : 0) - (this.keyL ? 1 : 0);
      p.x += dir * p.speed * dt;
    }
    p.x = clamp(p.x, p.w / 2, W - p.w / 2);

    this.spawnTimer -= dt;
    if (this.spawnTimer <= 0) {
      this.spawn();
      this.spawnTimer = this.difficulty().interval;
    }

    var dying = this.hp < 30;
    var magThresh = this.level >= 3 ? 1 : 3;       // 主管:磁吸常驻
    var catchY = H - 70;
    for (var i = this.items.length - 1; i >= 0; i--) {
      var it = this.items[i];
      it.y += it.vy * dt;
      it.spin += it.vspin * dt;

      if (this.fever > 0) {
        it.x += (p.x - it.x) * Math.min(1, dt * 7);
      } else if (!it.bad && this.combo >= magThresh) {
        it.x += (p.x - it.x) * Math.min(0.9, dt * Math.max(this.combo, 2) * 0.7);
      }

      it.trail.push({ x: it.x, y: it.y });
      if (it.trail.length > 6) it.trail.shift();

      if (it.y + it.r >= catchY && it.y - it.r <= catchY + p.h) {
        if (Math.abs(it.x - p.x) <= p.w / 2 + it.r * 0.6) {
          if (this.fever > 0) {
            var fg = it.bad ? 25 : 30;
            if (this.level >= 5) fg = Math.round(fg * 1.5);   // 卷王:逆袭暴击 ×1.5
            this.score += fg; this.feverGain += fg; this.scorePulse = 1;
            this.player.sy = 1.3; this.player.sx = 0.85;
            var fc = it.bad ? "#ffd24a" : "#46e08a";
            this.burst(it.x, catchY - 10, fc, this.level >= 5 ? 30 : 22, this.level >= 5 ? 1.5 : 1.2);
            this.ring(it.x, catchY - 10, it.bad ? "rgba(255,210,74,0.9)" : "rgba(70,224,138,0.9)");
            this.addPop(it.x, catchY - 28, (it.bad ? "反杀 " + it.t : it.t) + " +" + fg, fc, it.bad);
            if (it.bad) audio.smash(); else audio.good(8);
          } else if (it.bad) {
            this.hp -= 20;
            this.shake = Math.max(this.shake, 16);
            this.flash = 0.6; this.hpPulse = 1; this.combo = 0;
            this.rage = Math.max(0, this.rage - 15);
            this.player.sy = 0.55; this.player.sx = 1.3;
            this.burst(it.x, catchY - 10, "#ff5b6b", 24, 1.1);
            this.ring(it.x, catchY - 10, "rgba(255,91,107,0.85)");
            this.addPop(it.x, catchY - 28, it.t + " -20", "#ff5b6b");
            audio.bad();
            if (this.hp <= 0) { this.hp = 0; this.gameOver(); }
          } else {
            this.combo++;
            this.comboTimer = 2.6; this.comboPulse = 1;
            var gain = 10 + (this.combo >= 2 ? (this.combo - 1) * 5 : 0);
            var heal = dying ? 12 : 6;
            if (this.level >= 2) heal = Math.round(heal * 1.5);   // 小组长:回血翻倍
            this.hp = Math.min(100, this.hp + heal);
            this.score += gain; this.scorePulse = 1;
            var rmul = (dying ? 1.6 : 1) * (this.level >= 4 ? 1.3 : 1);  // 打工超人:攒怒更快
            this.rage = Math.min(100, this.rage + (8 + this.combo * 1.5) * rmul);
            this.ragePulse = 1;
            this.player.sy = 1.35; this.player.sx = 0.8;
            this.burst(it.x, catchY - 10, "#46e08a", 18, 1);
            this.ring(it.x, catchY - 10, "rgba(70,224,138,0.85)");
            this.addPop(it.x, catchY - 28, it.t + " +" + gain, "#46e08a", this.combo >= 3);
            audio.good(this.combo - 1);
            if (this.rage >= 100 && this.fever <= 0) this.startFever();
          }
          this.items.splice(i, 1);
          this.checkLevelUp();
          continue;
        }
      }
      if (it.y - it.r > H) this.items.splice(i, 1);
    }
  };

  // ---------- 绘制 ----------
  Game.prototype.drawBg = function () {
    var g = ctx.createLinearGradient(0, 0, 0, H);
    if (this.fever > 0) { g.addColorStop(0, "#3a2a10"); g.addColorStop(1, "#1a1205"); }
    else { g.addColorStop(0, "#141b2c"); g.addColorStop(1, "#080c15"); }
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    for (var s = 0; s < this.stars.length; s++) {
      var st = this.stars[s];
      ctx.globalAlpha = st.a;
      ctx.fillStyle = this.fever > 0 ? "#ffd24a" : "#7da2ff";
      ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, 6.2832); ctx.fill();
    }
    ctx.globalAlpha = 1;

    var br = 0.05 + 0.025 * Math.sin(this.bgHue * 0.5);
    ctx.strokeStyle = (this.fever > 0 ? "rgba(255,210,74," : "rgba(120,140,180,") + br.toFixed(3) + ")";
    ctx.lineWidth = 1;
    var step = 56;
    for (var x = 0; x <= W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (var y = 0; y <= H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    ctx.fillStyle = "rgba(90,110,150,0.10)";
    ctx.fillRect(0, H - 46, W, 46);
  };

  Game.prototype.drawItems = function () {
    for (var i = 0; i < this.items.length; i++) {
      var it = this.items[i];
      for (var k = 0; k < it.trail.length; k++) {
        var tr = it.trail[k];
        ctx.globalAlpha = (k / it.trail.length) * 0.18;
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, it.r * (0.5 + k / it.trail.length * 0.5), 0, 6.2832);
        ctx.fillStyle = it.bad ? "#ff5b6b" : "#46e08a";
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      var pulse = 1 + 0.08 * Math.sin(this.t * 6 + it.x);
      ctx.beginPath();
      ctx.arc(it.x, it.y, it.r * pulse, 0, 6.2832);
      ctx.fillStyle = it.bad ? "rgba(255,91,107,0.18)" : "rgba(70,224,138,0.18)";
      ctx.fill();
      ctx.lineWidth = 2.2;
      ctx.strokeStyle = it.bad ? "rgba(255,91,107,0.7)" : "rgba(70,224,138,0.7)";
      ctx.stroke();
      ctx.save();
      ctx.translate(it.x, it.y + 1);
      ctx.rotate(Math.sin(it.spin) * 0.18);
      ctx.font = (it.r * 1.3 | 0) + "px serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(it.e, 0, 0);
      ctx.restore();
    }
  };

  Game.prototype.drawRings = function () {
    for (var i = 0; i < this.rings.length; i++) {
      var r = this.rings[i];
      ctx.globalAlpha = Math.max(0, r.life);
      ctx.lineWidth = 3 * r.life + 0.5;
      ctx.strokeStyle = r.color;
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 6.2832); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  };

  Game.prototype.drawParticles = function () {
    for (var i = 0; i < this.parts.length; i++) {
      var p = this.parts[i];
      ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, p.r * (p.life / p.max)), 0, 6.2832); ctx.fill();
    }
    ctx.globalAlpha = 1;
  };

  Game.prototype.drawShards = function () {
    for (var i = 0; i < this.shards.length; i++) {
      var s = this.shards[i];
      ctx.save();
      ctx.globalAlpha = clamp(s.life, 0, 1);
      ctx.translate(s.x, s.y); ctx.rotate(s.rot);
      ctx.fillStyle = s.color;
      ctx.fillRect(-s.s / 2, -s.s / 2, s.s, s.s);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  };

  Game.prototype.drawPlayer = function () {
    var p = this.player;
    var y = H - 70;
    var fev = this.fever > 0;
    var form = FORMS[this.level];
    ctx.save();
    ctx.translate(p.x, y + p.h);
    ctx.scale(p.sx, p.sy);
    ctx.translate(-p.x, -(y + p.h));
    ctx.shadowColor = fev ? "rgba(255,210,74,0.9)" : form.tray;
    ctx.shadowBlur = fev ? 22 : 14;
    ctx.fillStyle = fev ? "#ffd24a" : form.tray;
    roundRect(ctx, p.x - p.w / 2, y, p.w, p.h, 8);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = "30px serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(form.emoji, p.x, y - 22);
    ctx.restore();
  };

  Game.prototype.drawPops = function () {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    for (var i = 0; i < this.pops.length; i++) {
      var p = this.pops[i];
      ctx.globalAlpha = clamp(p.life, 0, 1);
      ctx.fillStyle = p.color;
      var sz = Math.round(15 * p.scale);
      ctx.font = "bold " + sz + "px sans-serif";
      ctx.fillText(p.text, p.x, p.y);
    }
    ctx.globalAlpha = 1;
  };

  Game.prototype.drawVignette = function () {
    if (this.hp >= 35 && this.flash <= 0) return;
    var danger = this.hp < 35 ? (1 - this.hp / 35) : 0;
    var pulse = 0.5 + 0.5 * Math.sin(this.t * 8);
    var a = clamp(danger * (0.25 + 0.35 * pulse) + this.flash * 0.5, 0, 0.8);
    if (a <= 0.01) return;
    var g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.32, W / 2, H / 2, Math.max(W, H) * 0.72);
    g.addColorStop(0, "rgba(255,40,60,0)");
    g.addColorStop(1, "rgba(255,40,60," + a.toFixed(3) + ")");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  };

  Game.prototype.drawFeverFX = function () {
    if (this.fever > 0) {
      var pulse = 0.5 + 0.5 * Math.sin(this.t * 12);
      var a = 0.12 + 0.12 * pulse;
      var g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.30, W / 2, H / 2, Math.max(W, H) * 0.75);
      g.addColorStop(0, "rgba(255,200,60,0)");
      g.addColorStop(1, "rgba(255,180,30," + a.toFixed(3) + ")");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
    if (this.feverFlash > 0) {
      ctx.fillStyle = "rgba(255,200,60," + (this.feverFlash * 0.4).toFixed(3) + ")";
      ctx.fillRect(0, 0, W, H);
    }
    if (this.levelFlash > 0) {
      ctx.fillStyle = "rgba(255,255,255," + (this.levelFlash * 0.5).toFixed(3) + ")";
      ctx.fillRect(0, 0, W, H);
    }
  };

  Game.prototype.drawOverFlash = function () {
    if (this.overFlash <= 0) return;
    ctx.fillStyle = "rgba(255,60,80," + (this.overFlash * 0.5).toFixed(3) + ")";
    ctx.fillRect(0, 0, W, H);
  };

  Game.prototype.drawHUD = function () {
    var bw = Math.min(W - 40, 320), bx = 20, by = 18;
    // 血条
    var bh = 14;
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    roundRect(ctx, bx, by, bw, bh, 7); ctx.fill();
    var ratio = this.hp / 100;
    var col = this.hp > 50 ? "#46e08a" : (this.hp > 25 ? "#ffc046" : "#ff5b6b");
    var hpScale = 1 + this.hpPulse * 0.12;
    ctx.save();
    ctx.translate(bx, by + bh / 2); ctx.scale(1, hpScale); ctx.translate(-bx, -(by + bh / 2));
    ctx.fillStyle = col;
    if (this.hp <= 25) { ctx.shadowColor = "#ff5b6b"; ctx.shadowBlur = 10 + 8 * Math.sin(this.t * 10); }
    roundRect(ctx, bx, by, Math.max(2, bw * ratio), bh, 7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.fillStyle = "#9aa6ba";
    ctx.font = "10px sans-serif";
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText("职场存活值", bx + 2, by - 7);

    // 逆袭值槽
    var ry = by + bh + 7, rh = 9;
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    roundRect(ctx, bx, ry, bw, rh, 4); ctx.fill();
    ctx.textBaseline = "middle"; ctx.textAlign = "left";
    if (this.fever > 0) {
      var fr = clamp(this.fever / (FEVER_DUR + (this.level >= 4 ? 2 : 0)), 0, 1);
      ctx.fillStyle = "#ffd24a";
      ctx.shadowColor = "#ffd24a"; ctx.shadowBlur = 10 + 6 * Math.sin(this.t * 14);
      roundRect(ctx, bx, ry, Math.max(2, bw * fr), rh, 4); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffd24a"; ctx.font = "bold 10px sans-serif";
      ctx.fillText("🔥 逆袭中 ×3 反杀!", bx + 2, ry + rh + 8);
    } else {
      var rgScale = 1 + this.ragePulse * 0.1;
      ctx.save();
      ctx.translate(bx, ry + rh / 2); ctx.scale(1, rgScale); ctx.translate(-bx, -(ry + rh / 2));
      var full = this.rage >= 100;
      ctx.fillStyle = full ? "#ffd24a" : "#ff9a3a";
      if (full) { ctx.shadowColor = "#ffd24a"; ctx.shadowBlur = 12; }
      roundRect(ctx, bx, ry, Math.max(2, bw * (this.rage / 100)), rh, 4); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.fillStyle = "#caa86a"; ctx.font = "10px sans-serif";
      ctx.fillText("逆袭值 " + (this.rage | 0) + "%", bx + 2, ry + rh + 8);
    }

    // 形态进化进度条
    var fy = ry + rh + 16, fh = 9;
    var form = FORMS[this.level];
    var maxed = this.level >= FORMS.length - 1;
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    roundRect(ctx, bx, fy, bw, fh, 4); ctx.fill();
    var fprog = maxed ? 1 : clamp((this.score - form.at) / (FORMS[this.level + 1].at - form.at), 0, 1);
    ctx.fillStyle = form.tray;
    roundRect(ctx, bx, fy, Math.max(2, bw * fprog), fh, 4); ctx.fill();
    ctx.fillStyle = "#cfd6e4"; ctx.font = "bold 11px sans-serif"; ctx.textBaseline = "middle";
    ctx.fillText(form.emoji + " " + form.name + (maxed ? " · MAX" : " → " + FORMS[this.level + 1].name), bx + 2, fy + fh + 9);

    // 右上:在职天数 + 积分
    ctx.textAlign = "right";
    var dScale = 1 + this.scorePulse * 0.25;
    ctx.save();
    ctx.translate(W - 20, by + 8); ctx.scale(dScale, dScale);
    ctx.font = "bold 18px sans-serif"; ctx.fillStyle = "#eef2f9";
    ctx.fillText("在职 " + this.days + " 天", 0, 0);
    ctx.restore();
    ctx.textAlign = "right"; ctx.font = "bold 12px sans-serif"; ctx.fillStyle = "#7f8aa0";
    ctx.fillText("积分 " + this.score, W - 20, by + 30);

    // 屏幕中上:逆袭/连击大字(避开左上 HUD)
    var midY = H * 0.2;
    if (this.fever > 0) {
      var cs = 1 + Math.max(0, this.feverFlash) * 0.4;
      ctx.save();
      ctx.translate(W / 2, midY); ctx.scale(cs, cs);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffd24a";
      ctx.shadowColor = "rgba(255,210,74,0.8)"; ctx.shadowBlur = 16;
      ctx.font = "bold 30px sans-serif";
      ctx.fillText("🔥 逆袭时刻 " + Math.ceil(this.fever) + "s", 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
    } else if (this.combo >= 2) {
      var ccs = 1 + this.comboPulse * 0.5;
      ctx.save();
      ctx.translate(W / 2, midY); ctx.scale(ccs, ccs);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffc046";
      ctx.shadowColor = "rgba(255,192,70,0.7)"; ctx.shadowBlur = 12;
      ctx.font = "bold 30px sans-serif";
      ctx.fillText("🔥 x" + this.combo, 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
      var cw = 80, cx = W / 2 - cw / 2, cy = midY + 18;
      ctx.fillStyle = "rgba(255,192,70,0.25)";
      roundRect(ctx, cx, cy, cw, 4, 2); ctx.fill();
      ctx.fillStyle = "#ffc046";
      roundRect(ctx, cx, cy, cw * clamp(this.comboTimer / 2.6, 0, 1), 4, 2); ctx.fill();
    }
  };

  function drawCenterCard(lines) {
    var cw = Math.min(W - 48, 380);
    var ch = lines.reduce(function (s, l) { return s + l.gap; }, 56);
    var cx = W / 2, cy = H / 2;
    ctx.fillStyle = "rgba(12,18,30,0.92)";
    roundRect(ctx, cx - cw / 2, cy - ch / 2, cw, ch, 16); ctx.fill();
    ctx.strokeStyle = "rgba(125,162,255,0.45)"; ctx.lineWidth = 1.5;
    roundRect(ctx, cx - cw / 2, cy - ch / 2, cw, ch, 16); ctx.stroke();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    var y = cy - ch / 2 + 32;
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      ctx.fillStyle = l.color || "#eef2f9";
      ctx.font = l.font || "16px sans-serif";
      ctx.fillText(l.text, cx, y);
      y += l.gap;
    }
  }

  Game.prototype.drawReady = function () {
    var chain = FORMS.map(function (f) { return f.emoji; }).join(" → ");
    drawCenterCard([
      { text: "今天我被优化了", font: "bold 26px sans-serif", color: "#7da2ff", gap: 38 },
      { text: "接 💰 续命,躲 📋 优化,攒满 🔥 逆袭", font: "13px sans-serif", color: "#aeb8cc", gap: 28 },
      { text: "积分一路进化,解锁 6 种形态", font: "bold 14px sans-serif", color: "#ffd24a", gap: 26 },
      { text: chain, font: "20px serif", color: "#cfd6e4", gap: 26 },
      { text: this.bestForm > 0 ? ("历史最高形态:" + FORMS[this.bestForm].name) : "能进化到卷王之王吗?", font: "12px sans-serif", color: "#7f8aa0", gap: 38 },
      { text: "点击 / 按空格 开始打工", font: "bold 16px sans-serif", color: "#46e08a", gap: 22 }
    ]);
  };

  Game.prototype.drawOver = function () {
    var form = FORMS[this.level];
    drawCenterCard([
      { text: "💼 你被优化了", font: "bold 26px sans-serif", color: "#ff5b6b", gap: 40 },
      { text: "在职 " + this.days + " 天 · 积分 " + this.score, font: "bold 18px sans-serif", color: "#eef2f9", gap: 30 },
      { text: "最终形态 " + form.emoji + " " + form.name, font: "bold 16px sans-serif", color: form.tray, gap: 30 },
      { text: verdict(this.days), font: "13px sans-serif", color: "#aeb8cc", gap: 28 },
      { text: "纪录:在职 " + this.best + " 天 · 最高 " + FORMS[this.bestForm].name, font: "12px sans-serif", color: "#7f8aa0", gap: 38 },
      { text: "点击 / 空格 再就业", font: "bold 16px sans-serif", color: "#46e08a", gap: 22 }
    ]);
  };

  Game.prototype.render = function () {
    ctx.save();
    if (this.shake > 0) {
      ctx.translate((Math.random() - 0.5) * this.shake, (Math.random() - 0.5) * this.shake);
    }
    this.drawBg();
    this.drawItems();
    this.drawRings();
    this.drawShards();
    this.drawParticles();
    if (this.state !== "over") this.drawPlayer();
    this.drawPops();
    ctx.restore();

    this.drawVignette();
    this.drawFeverFX();
    this.drawOverFlash();
    this.drawHUD();
    if (this.state === "ready") this.drawReady();
    else if (this.state === "over") this.drawOver();
  };

  function roundRect(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  // ---------- 输入 ----------
  var game = new Game();
  window.game = game;

  function tap() {
    audio.unlock();
    if (game.state === "ready" || game.state === "over") game.start();
  }

  window.addEventListener("keydown", function (e) {
    if (e.code === "ArrowLeft" || e.code === "KeyA") game.keyL = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") game.keyR = true;
    if (e.code === "Space" || e.code === "Enter") { e.preventDefault(); tap(); }
  });
  window.addEventListener("keyup", function (e) {
    if (e.code === "ArrowLeft" || e.code === "KeyA") game.keyL = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") game.keyR = false;
  });

  function pointerPos(e) {
    var rect = canvas.getBoundingClientRect();
    return (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  }
  function onDown(e) {
    e.preventDefault();
    audio.unlock();
    if (game.state !== "playing") { tap(); return; }
    game.pointerX = pointerPos(e);
  }
  function onMove(e) {
    if (game.pointerX == null) return;
    e.preventDefault();
    game.pointerX = pointerPos(e);
  }
  function onUp() { game.pointerX = null; }

  canvas.addEventListener("mousedown", onDown);
  canvas.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  canvas.addEventListener("touchstart", onDown, { passive: false });
  canvas.addEventListener("touchmove", onMove, { passive: false });
  window.addEventListener("touchend", onUp);

  // ---------- 主循环 ----------
  var last = 0;
  function loop(ts) {
    if (!last) last = ts;
    var dt = Math.min(0.05, (ts - last) / 1000);
    last = ts;
    if (game.slowmo > 0) dt *= lerp(1, 0.25, clamp(game.slowmo, 0, 1));
    game.update(dt);
    game.render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
